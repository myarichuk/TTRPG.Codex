name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v1.2.0
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v1.2.0

      - name: Publish Linux (x64)
        run: dotnet publish src/Codex.Web/Codex.Web.csproj -c Release -r linux-x64 -o dist/linux -p:PublishSingleFile=true -p:SelfContained=true -p:PublishTrimmed=true -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Archive Linux (x64)
        run: cd dist/linux && zip -r ../TTRPG.Codex-linux-x64-${{ steps.gitversion.outputs.semVer }}.zip .

      - name: Publish Windows (x64)
        run: dotnet publish src/Codex.Web/Codex.Web.csproj -c Release -r win-x64 -o dist/win -p:PublishSingleFile=true -p:SelfContained=true -p:PublishTrimmed=true -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Archive Windows (x64)
        run: cd dist/win && zip -r ../TTRPG.Codex-win-x64-${{ steps.gitversion.outputs.semVer }}.zip .

      - name: Publish macOS (arm64)
        run: dotnet publish src/Codex.Web/Codex.Web.csproj -c Release -r osx-arm64 -o dist/macos -p:PublishSingleFile=true -p:SelfContained=true -p:PublishTrimmed=true -p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Archive macOS (arm64)
        run: cd dist/macos && zip -r ../TTRPG.Codex-osx-arm64-${{ steps.gitversion.outputs.semVer }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ steps.gitversion.outputs.semVer }}
          generate_release_notes: true
          files: |
            dist/*.zip
