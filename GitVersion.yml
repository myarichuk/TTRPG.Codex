mode: Mainline
tag-prefix: v
major-version-bump-message: "^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\\([a-z ]+\\))?!:|^BREAKING CHANGE:"
minor-version-bump-message: "^(feat)(\\([a-z ]+\\))?:"
patch-version-bump-message: "^(fix)(\\([a-z ]+\\))?:"
no-bump-message: "^(build|chore|ci|docs|perf|refactor|revert|style|test)(\\([a-z ]+\\))?:"
branches:
  main:
    regex: ^master$|^main$
